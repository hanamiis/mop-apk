
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <title>Track 8</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="track">
      <img class="img" src="img/track8.png" alt="Track 8"/>
      <button class="track-play-btn" type="button" data-audio="img/track2.mp3" aria-label="Putar lagu">▶</button>
      <a class="button-back-to-home" href="index.html" aria-label="Kembali ke home"></a>
      <audio id="track-audio" src="img/track2.mp3"></audio>
    </main>
    <script>
      const playBtn = document.querySelector('.track-play-btn');
      const audio = document.getElementById('track-audio');

      if (playBtn && audio) {
        playBtn.addEventListener('click', () => {
          if (audio.paused) {
            audio.play();
            playBtn.textContent = '❚❚';
          } else {
            audio.pause();
            playBtn.textContent = '▶';
          }
        });
      }
    </script>
  </body>
</html>
